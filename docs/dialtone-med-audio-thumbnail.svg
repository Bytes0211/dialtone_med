<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 855" width="1520" height="855">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080C1E"/>
      <stop offset="100%" style="stop-color:#0D1230"/>
    </linearGradient>
    <linearGradient id="tealGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1B998B;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1B998B;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1520" height="855" fill="url(#bg)"/>

  <!-- Subtle teal accent glow - left side -->
  <ellipse cx="0" cy="427" rx="400" ry="500" fill="url(#tealGlow)"/>

  <!-- Top accent line -->
  <rect x="100" y="180" width="80" height="4" rx="2" fill="#1B998B"/>

  <!-- Line 1: Pain point -->
  <text x="100" y="290" font-family="Inter, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="700" font-size="72" fill="#FFFFFF" letter-spacing="-1.5">Patients are waiting.</text>
  <text x="100" y="380" font-family="Inter, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="700" font-size="72" fill="#FFFFFF" letter-spacing="-1.5">So are your callers.</text>

  <!-- Line 2: Solution -->
  <text x="100" y="500" font-family="Inter, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" font-size="42" fill="#8A8FAA" letter-spacing="-0.5">
    <tspan fill="#1B998B" font-weight="800">DialTone.Med</tspan>
    <tspan fill="#8A8FAA"> picks up so you don't have to.</tspan>
  </text>

  <!-- Bottom accent - DialTone.Med wordmark -->
  <text x="100" y="720" font-family="Inter, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="28" fill="#1B998B" letter-spacing="6" opacity="0.4">DIALTONE.MED</text>

  <!-- Decorative teal circle element - bottom right -->
  <circle cx="1350" cy="650" r="120" fill="none" stroke="#1B998B" stroke-width="1.5" opacity="0.15"/>
  <circle cx="1350" cy="650" r="80" fill="none" stroke="#1B998B" stroke-width="1" opacity="0.1"/>
  <circle cx="1350" cy="650" r="40" fill="#1B998B" opacity="0.08"/>

  <!-- Small plus/cross medical icon hints -->
  <g opacity="0.12" fill="#1B998B">
    <rect x="1330" y="340" width="40" height="8" rx="4"/>
    <rect x="1346" y="324" width="8" height="40" rx="4"/>
  </g>
  <g opacity="0.08" fill="#1B998B">
    <rect x="1200" y="220" width="24" height="5" rx="2.5"/>
    <rect x="1209.5" y="210.5" width="5" height="24" rx="2.5"/>
  </g>
</svg>